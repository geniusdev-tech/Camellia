version: "3.9"

services:
  gatestack:
    build: .
    container_name: gatestack
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_LOG_PATH=/data/audit.log
    volumes:
      - gatestack-data:/data
      - ${HOME}/.gatestack:/home/gatestack/.gatestack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gatestack-data:

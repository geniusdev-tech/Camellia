app = "gatestack"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV           = "production"
  PORT               = "5000"
  HOST               = "0.0.0.0"
  LOG_LEVEL          = "info"
  THROTTLE_TTL       = "60"
  THROTTLE_LIMIT     = "120"
  PUBLISH_MAX_CVSS   = "7"
  QUEUE_ENABLED      = "false"
  QUEUE_WORKER_ENABLED = "false"
  JWT_EXPIRES_IN     = "1h"

[[services]]
  internal_port = 5000
  protocol      = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    interval     = "15s"
    method       = "get"
    path         = "/health"
    timeout      = "5s"
    grace_period = "60s"


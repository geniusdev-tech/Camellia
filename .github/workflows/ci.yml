name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-pinned.txt ]; then
            pip install -r requirements-pinned.txt
          else
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt || true; fi
          pip install pyinstaller
          cd frontend && npm ci

      - name: Lint (flake8)
        run: |
          flake8 || true

      - name: Type-check frontend
        run: |
          cd frontend && npm run type-check

      - name: Check Python modules compile
        run: |
          python -m compileall app.py api core utils

      - name: Check Tauri Rust crate
        run: |
          make bundle-backend
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Security scan (Bandit)
        run: |
          bandit -r . -ll || true

      - name: Security scan (safety)
        run: |
          python -m pip install safety || true
          if [ -f requirements-pinned.txt ]; then
            safety check --file=requirements-pinned.txt || true
          else
            echo "requirements-pinned.txt not found; safety scan skipped. Use scripts/pin_requirements.sh to generate it." 
          fi

      - name: Run tests (pytest)
        run: |
          pytest -q

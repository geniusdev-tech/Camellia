services:
  - type: web
    name: gatestack-backend
    env: docker
    region: us-east-1
    plan: starter
    branch: main
    dockerfile: Dockerfile
    healthCheckPath: /health
    preDeployCommand: npm run prisma:migrate:deploy
    
    envVars:
      # Node & Core
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      
      # Frontend URL
      - key: ALLOWED_ORIGIN
        value: "http://localhost:3000"
      
      # Rate Limiting
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "120"
      
      # Publicação CVSS
      - key: PUBLISH_MAX_CVSS
        value: "7"
      
      # Redis
      - key: REDIS_HOST
        fromService:
          name: gatestack-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: gatestack-redis
          type: redis
          property: port
      
      # Database (definido automaticamente)
      - key: DATABASE_URL
        fromDatabase:
          name: gatestack-db

  - type: redis
    name: gatestack-redis
    plan: starter
    region: us-east-1
    maxmemoryPolicy: noeviction

databases:
  - type: postgres
    name: gatestack-db
    plan: starter
    region: us-east-1
    disk: 10
    username: gatestack_user
    database: gatestack_db

services:
  - type: web
    name: gatestack
    env: docker
    region: oregon
    plan: starter
    branch: main
    dockerfile: Dockerfile
    # Fallback to python environment if docker is not used
    buildCommand: "make install && make db-migrate && make build-web"
    startCommand: "./scripts/start-server.sh"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: PORT
        value: "5000"
      - key: HOST
        value: 0.0.0.0
      - key: DESKTOP_MODE
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_HTTPONLY
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: Strict
      - key: PERMANENT_SESSION_LIFETIME
        value: "300"
      - key: REDIS_URL
        value: ""
      - key: LIMITER_STORAGE_URI
        value: ""
      - key: KMS_PROVIDER
        value: file
      - key: AUDIT_LOG_PATH
        value: /tmp/audit.log
      - key: GATESTACK_ASYNC_WORKER
        value: "1"
      - key: GATESTACK_ASYNC_POLL_SECONDS
        value: "0.5"
      - key: SESSION_LIFETIME
        value: "300"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gatestack-db
          property: connectionString

databases:
  - type: postgres
    name: gatestack-db
    plan: starter
    region: oregon
    disk: 10
    username: gatestack
    database: gatestack

services:
  - type: web
    name: gatestack-backend
    env: docker
    region: us-east-1
    plan: starter
    branch: main
    dockerfile: Dockerfile
    healthCheckPath: /health
    preDeployCommand: npm run prisma:migrate:deploy
    
    envVars:
      # Node & Core
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      
      # Frontend URL
      - key: ALLOWED_ORIGIN
        value: "http://localhost:3000"
      
      # JWT & Security (use valores seguros/gere no Dashboard depois)
      - key: JWT_SECRET
        value: "change-me-to-random-32-chars-min-on-render-dashboard"
      - key: JWT_EXPIRES_IN
        value: "7d"
      
      # Admin padrão (ALTERE NO DASHBOARD ANTES DO DEPLOY!)
      - key: ADMIN_EMAIL
        value: "admin@gatestack.local"
      - key: ADMIN_PASSWORD
        value: "ChangeMeNow_12345"
      
      # Métricas (use valor seguro/gere no Dashboard depois)
      - key: METRICS_TOKEN
        value: "change-me-to-random-token-on-render-dashboard"
      
      # Rate Limiting
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "120"
      
      # Publicação CVSS
      - key: PUBLISH_MAX_CVSS
        value: "7"
      
      # Redis (configurar no Dashboard se usar Redis gerenciado)
      - key: REDIS_HOST
        value: "redis"
      - key: REDIS_PORT
        value: "6379"
      
      # Database (será definido automaticamente pelo Render)
      - key: DATABASE_URL
        fromDatabase:
          name: gatestack-db

databases:
  - type: postgres
    name: gatestack-db
    plan: starter
    region: us-east-1
    disk: 10
    username: gatestack_user
    database: gatestack_db

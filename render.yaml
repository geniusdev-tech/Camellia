services:
  - type: web
    name: gatestack-backend
    env: docker
    region: us-east-1
    plan: starter
    branch: main
    dockerfile: Dockerfile
    healthCheckPath: /health
    
    envVars:
      # Node & Core
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      
      # Frontend URL (atualize com seu domínio)
      - key: ALLOWED_ORIGIN
        value: http://localhost:3000
      
      # JWT & Security (gerado automaticamente)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      
      # Admin padrão (MUDE APÓS PRIMEIRO LOGIN!)
      - key: ADMIN_EMAIL
        value: admin@gatestack.local
      - key: ADMIN_PASSWORD
        generateValue: true
      
      # Métricas
      - key: METRICS_TOKEN
        generateValue: true
      
      # Rate Limiting
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "120"
      
      # Publicação CVSS
      - key: PUBLISH_MAX_CVSS
        value: "7"
      
      # Database (vinculado automaticamente)
      - key: DATABASE_URL
        fromDatabase:
          name: gatestack-db

databases:
  - type: postgres
    name: gatestack-db
    plan: starter
    region: us-east-1
    disk: 10
    username: gatestack_user
    database: gatestack_db
